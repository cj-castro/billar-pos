<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BilliardBar POS — Setup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      background: #1e293b;
      border-radius: 14px;
      padding: 40px 44px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
      border: 1px solid #334155;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .brand-icon {
      font-size: 26px;
      line-height: 1;
    }

    .brand-name {
      font-size: 22px;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: -0.3px;
    }

    .subtitle {
      color: #64748b;
      font-size: 13px;
      margin-bottom: 32px;
      margin-left: 36px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #475569;
      margin-bottom: 16px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 5px;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 9px 13px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 7px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
    }

    input::placeholder { color: #334155; }

    .row {
      display: flex;
      gap: 10px;
    }

    .row .field { flex: 1; }
    .row .field.port { flex: 0 0 88px; }

    .divider {
      height: 1px;
      background: #1e3a5f;
      margin: 22px 0;
    }

    button[type="submit"] {
      width: 100%;
      padding: 11px;
      background: #0ea5e9;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s, transform 0.1s;
      font-family: inherit;
    }

    button[type="submit"]:hover:not(:disabled) { background: #38bdf8; }
    button[type="submit"]:active:not(:disabled) { transform: scale(0.99); }

    button[type="submit"]:disabled {
      background: #1e3a5f;
      color: #475569;
      cursor: not-allowed;
    }

    .status {
      margin-top: 14px;
      font-size: 13px;
      min-height: 18px;
    }

    .status.loading { color: #94a3b8; }

    .status.error {
      background: #2d0f0f;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 8px;
      padding: 11px 13px;
      line-height: 1.5;
    }

    .dots::after {
      content: '';
      animation: dots 1.2s steps(3, end) infinite;
    }

    @keyframes dots {
      0%   { content: '.'; }
      33%  { content: '..'; }
      66%  { content: '...'; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <span class="brand-icon">🎱</span>
      <span class="brand-name">BilliardBar POS</span>
    </div>
    <div class="subtitle">First-time setup — connect to your PostgreSQL database</div>

    <form id="form" autocomplete="off">
      <div class="section-label">Database Connection</div>

      <div class="row">
        <div class="field">
          <label for="host">Host</label>
          <input id="host" type="text" value="localhost" placeholder="localhost" required spellcheck="false">
        </div>
        <div class="field port">
          <label for="port">Port</label>
          <input id="port" type="number" value="5432" min="1" max="65535" required>
        </div>
      </div>

      <div class="field">
        <label for="dbName">Database Name</label>
        <input id="dbName" type="text" value="billiardbar" placeholder="billiardbar" required spellcheck="false">
      </div>

      <div class="divider"></div>

      <div class="section-label">Credentials</div>

      <div class="field">
        <label for="user">Username</label>
        <input id="user" type="text" value="postgres" placeholder="postgres" required spellcheck="false">
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter PostgreSQL password" required>
      </div>

      <button type="submit" id="btn">Connect &amp; Initialize Database</button>

      <div class="status" id="status"></div>
    </form>
  </div>

  <script>
    const form   = document.getElementById('form')
    const btn    = document.getElementById('btn')
    const status = document.getElementById('status')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()

      btn.disabled = true
      status.className = 'status loading'
      status.innerHTML = '<span class="dots">Connecting and initializing database</span>'

      const config = {
        host:     document.getElementById('host').value.trim(),
        port:     document.getElementById('port').value.trim(),
        dbName:   document.getElementById('dbName').value.trim(),
        user:     document.getElementById('user').value.trim(),
        password: document.getElementById('password').value,
      }

      try {
        const result = await window.electronAPI.saveConfig(config)
        if (!result.success) throw new Error(result.error || 'Unknown error')
        // main process closes this window and opens the app on success
      } catch (err) {
        status.className = 'status error'
        status.textContent = err.message
        btn.disabled = false
      }
    })
  </script>
</body>
</html>
